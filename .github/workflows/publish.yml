name: PublishRelease

# Trigger the workflow when a version tag is pushed (e.g., v0.1.4).
# Required repo secrets:
#   OPEN_VSX_TOKEN         — https://open-vsx.org user settings → Access Tokens
#   VS_MARKETPLACE_TOKEN   — Azure DevOps PAT with Marketplace → Manage scope
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      # Runs vscode:prepublish, packages .vsix, and uploads to Open VSX.
      - name: Publish to Open VSX
        uses: HaaLeo/publish-vscode-extension@v2
        id: publishOpenVSX
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}

      # Reuses the same .vsix artifact from the Open VSX step.
      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.publishOpenVSX.outputs.vsixPath }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
          draft: false
          prerelease: false
