name: PublishRelease

# Trigger the workflow when a version tag is pushed (e.g., v0.1.3)
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Use Node.js 18.x
        uses: actions/setup-node@v2
        with:
          node-version: 18.x

      - name: Install dependencies
        run: npm install

      # Package the extension into a .vsix file
      # This will automatically run the 'vscode:prepublish' script defined in package.json
      - name: Build and Package Extension
        run: npx vsce package

      # Create a new GitHub Release and upload the .vsix file as an asset
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: '*.vsix'
          generate_release_notes: true
          draft: false
          prerelease: false
