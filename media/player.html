<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}} https:; media-src {{cspSource}}; connect-src {{cspSource}}; style-src {{cspSource}}; script-src {{cspSource}};">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CP's Nice Player</title>
  <link rel="stylesheet" href="{{styleUri}}">
</head>
<body>
  <main class="card">
    <h1>CP's Nice Player</h1>
    <p class="subtitle">Open a local audio file to start playback.</p>
    <section class="track" aria-live="polite">
      <div>
        <div class="track-name" id="trackName">No media loaded</div>
        <div class="track-state" id="trackState">Waiting for a file</div>
      </div>
    </section>
    <audio id="audioPlayer" controls preload="metadata"></audio>
    <section class="fallback-controls is-hidden" id="fallbackControls" aria-label="Web Audio fallback controls">
      <div class="fallback-row">
        <button id="fallbackPlayPause" class="btn" type="button">Play</button>
        <div class="time"><span id="fallbackCurrentTime">0:00</span> / <span id="fallbackDuration">0:00</span></div>
      </div>
      <label class="sr-only" for="fallbackSeek">Seek</label>
      <input id="fallbackSeek" type="range" min="0" max="1" step="0.001" value="0">
      <div class="fallback-row">
        <label for="fallbackVolume">Volume</label>
        <input id="fallbackVolume" type="range" min="0" max="1" step="0.01" value="1">
        <label class="checkbox"><input id="fallbackMuted" type="checkbox"> Muted</label>
      </div>
    </section>
    <div class="empty" id="emptyState">Open an audio file and choose CP's Nice Player from the editor title or Open With menu.</div>
    <details class="debug-panel" id="debugPanel" open>
      <summary>Debug information</summary>
      <div class="debug-body">
        <dl class="debug-grid" id="debugGrid"></dl>
        <div class="debug-log-title">Event log</div>
        <ol class="debug-log" id="debugLog"></ol>
      </div>
    </details>
  </main>
  <script src="{{audioEngineUri}}"></script>
  <script src="{{scriptUri}}"></script>
</body>
</html>
