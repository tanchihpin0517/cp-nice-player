<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}} https:; connect-src {{cspSource}} http://127.0.0.1:* http://localhost:*; style-src {{cspSource}}; script-src {{cspSource}} 'self' blob:; worker-src {{cspSource}} 'self' blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="cp-worklet-module-url" content="{{workletProcessorUri}}">
  <title>CP's Nice Player</title>
  <link rel="stylesheet" href="{{styleUri}}">
</head>
<body>
  <main class="card">
    <h1>CP's Nice Player</h1>
    <p class="subtitle">Chunked streaming playback from the local playback server.</p>
    <section class="track" aria-live="polite">
      <div>
        <div class="track-name" id="trackName">No media loaded</div>
        <div class="track-state" id="trackState">Waiting for a file</div>
      </div>
    </section>
    <section class="playback-controls" id="playbackControls" aria-label="Playback controls">
      <div class="playback-row">
        <button id="playbackPlayPause" class="btn" type="button" disabled aria-label="Play">Play</button>
        <div class="time"><span id="playbackCurrentTime">0:00</span> / <span id="playbackDuration">0:00</span></div>
      </div>
      <label class="sr-only" for="playbackSeek">Seek</label>
      <input id="playbackSeek" type="range" min="0" max="1" step="0.001" value="0" disabled title="Seek">
      <div class="playback-row">
        <label for="playbackVolume">Volume</label>
        <input id="playbackVolume" type="range" min="0" max="1" step="0.01" value="1" disabled>
        <label class="checkbox"><input id="playbackMuted" type="checkbox" disabled> Muted</label>
      </div>
    </section>
    <div class="empty" id="emptyState">Open an audio file and choose CP's Nice Player from the editor title or Open With menu.</div>
    <details class="debug-panel" id="debugPanel" open>
      <summary>Debug information</summary>
      <div class="debug-body">
        <dl class="debug-grid" id="debugGrid"></dl>
        <div class="debug-log-title">Event log</div>
        <ol class="debug-log" id="debugLog"></ol>
      </div>
    </details>
  </main>
  <script src="{{pcmRingUri}}"></script>
  <script src="{{workletSchedulerUri}}"></script>
  <script src="{{engineScriptUri}}"></script>
  <script src="{{scriptUri}}"></script>
</body>
</html>
